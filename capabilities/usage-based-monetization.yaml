naftiko: 1.0.0-alpha2
info:
  label: Amberflo Usage-Based Monetization
  description: Unified workflow for API monetization teams combining metering and billing APIs. Enables end-to-end usage tracking,
    customer management, and billing automation for product and finance teams.
  tags:
  - Amberflo
  - Usage-Based Billing
  - Metering
  - Monetization
  - FinOps
  created: '2026-04-19'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    AMBERFLO_API_KEY: AMBERFLO_API_KEY
capability:
  consumes:
  - type: http
    namespace: amberflo-metering
    baseUri: https://app.amberflo.io
    description: Amberflo Metering API for event ingestion and usage queries.
    authentication:
      type: apikey
      key: X-API-KEY
      value: '{{AMBERFLO_API_KEY}}'
      placement: header
    resources:
    - name: meter-definitions
      path: /meter-definition
      description: Meter definition management
      operations:
      - name: list-meter-definitions
        method: GET
        description: List all meter definitions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-meter-definition
        method: POST
        description: Create a new meter definition
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            meterApiName: '{{tools.meterApiName}}'
            displayName: '{{tools.displayName}}'
            type: '{{tools.type}}'
      - name: update-meter-definition
        method: PUT
        description: Update an existing meter definition
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: event-ingestion
      path: /ingest
      description: Meter event ingestion endpoint
      operations:
      - name: ingest-meter-events
        method: POST
        description: Ingest one or more meter events
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            meterApiName: '{{tools.meterApiName}}'
            customerId: '{{tools.customerId}}'
            meterValue: '{{tools.meterValue}}'
            meterTimeInMillis: '{{tools.meterTimeInMillis}}'
    - name: usage-queries
      path: /usage
      description: Usage data query endpoint
      operations:
      - name: query-usage
        method: POST
        description: Query aggregated usage data
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            meterApiName: '{{tools.meterApiName}}'
            startTimeInSeconds: '{{tools.startTimeInSeconds}}'
            endTimeInSeconds: '{{tools.endTimeInSeconds}}'
            aggregation: '{{tools.aggregation}}'
            timeGroupingInterval: '{{tools.timeGroupingInterval}}'
  - type: http
    namespace: amberflo-billing
    baseUri: https://app.amberflo.io
    description: Amberflo Billing API for customer and subscription management.
    authentication:
      type: apikey
      key: X-API-KEY
      value: '{{AMBERFLO_API_KEY}}'
      placement: header
    resources:
    - name: customers
      path: /customers
      description: Customer account management
      operations:
      - name: list-customers
        method: GET
        description: List all customers
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-customer
        method: POST
        description: Create a new customer
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            customerId: '{{tools.customerId}}'
            customerName: '{{tools.customerName}}'
            customerEmail: '{{tools.customerEmail}}'
            lifecycleStage: '{{tools.lifecycleStage}}'
      - name: update-customer
        method: PUT
        description: Update an existing customer
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: invoices
      path: /payments-billing-customer-product-invoice
      description: Customer invoice management
      operations:
      - name: list-invoices
        method: GET
        description: List invoices for a customer
        inputParameters:
        - name: customerId
          in: query
          type: string
          required: true
          description: Customer ID to list invoices for
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: prepaid-orders
      path: /payments-pricing-amberflo-customer-prepaid
      description: Prepaid credit order management
      operations:
      - name: create-prepaid-order
        method: POST
        description: Create a prepaid order for a customer
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            customerId: '{{tools.customerId}}'
            amount: '{{tools.amount}}'
            currency: '{{tools.currency}}'
  exposes:
  - type: rest
    port: 8080
    namespace: amberflo-monetization-api
    description: Unified REST API for usage-based monetization workflows.
    resources:
    - path: /v1/meter-definitions
      name: meter-definitions
      description: Manage meter definitions for tracking usage
      operations:
      - method: GET
        name: list-meter-definitions
        description: List all meter definitions
        call: amberflo-metering.list-meter-definitions
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-meter-definition
        description: Create a new meter definition
        call: amberflo-metering.create-meter-definition
        with:
          meterApiName: rest.meterApiName
          displayName: rest.displayName
          type: rest.type
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/events
      name: events
      description: Ingest meter events
      operations:
      - method: POST
        name: ingest-events
        description: Ingest usage events for metering
        call: amberflo-metering.ingest-meter-events
        with:
          meterApiName: rest.meterApiName
          customerId: rest.customerId
          meterValue: rest.meterValue
          meterTimeInMillis: rest.meterTimeInMillis
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/usage
      name: usage
      description: Query usage data
      operations:
      - method: POST
        name: query-usage
        description: Query aggregated usage data
        call: amberflo-metering.query-usage
        with:
          meterApiName: rest.meterApiName
          startTimeInSeconds: rest.startTimeInSeconds
          endTimeInSeconds: rest.endTimeInSeconds
          aggregation: rest.aggregation
          timeGroupingInterval: rest.timeGroupingInterval
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/customers
      name: customers
      description: Manage customer accounts
      operations:
      - method: GET
        name: list-customers
        description: List all customers
        call: amberflo-billing.list-customers
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-customer
        description: Create a new customer account
        call: amberflo-billing.create-customer
        with:
          customerId: rest.customerId
          customerName: rest.customerName
          customerEmail: rest.customerEmail
          lifecycleStage: rest.lifecycleStage
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/invoices
      name: invoices
      description: Retrieve customer invoices
      operations:
      - method: GET
        name: list-invoices
        description: List invoices for a customer
        call: amberflo-billing.list-invoices
        with:
          customerId: rest.customerId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/prepaid-orders
      name: prepaid-orders
      description: Manage prepaid credit orders
      operations:
      - method: POST
        name: create-prepaid-order
        description: Create a prepaid order for a customer
        call: amberflo-billing.create-prepaid-order
        with:
          customerId: rest.customerId
          amount: rest.amount
          currency: rest.currency
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: amberflo-monetization-mcp
    transport: http
    description: MCP server for AI-assisted usage-based monetization and billing automation.
    tools:
    - name: list-meter-definitions
      description: List all meter definitions for usage tracking
      hints:
        readOnly: true
        openWorld: true
      call: amberflo-metering.list-meter-definitions
      outputParameters:
      - type: object
        mapping: $.
    - name: create-meter-definition
      description: Create a new meter definition to track usage events
      hints:
        readOnly: false
      call: amberflo-metering.create-meter-definition
      with:
        meterApiName: tools.meterApiName
        displayName: tools.displayName
        type: tools.type
      outputParameters:
      - type: object
        mapping: $.
    - name: ingest-events
      description: Ingest meter events to track usage
      hints:
        readOnly: false
      call: amberflo-metering.ingest-meter-events
      with:
        meterApiName: tools.meterApiName
        customerId: tools.customerId
        meterValue: tools.meterValue
        meterTimeInMillis: tools.meterTimeInMillis
      outputParameters:
      - type: object
        mapping: $.
    - name: query-usage
      description: Query aggregated usage data for a meter
      hints:
        readOnly: true
        openWorld: true
      call: amberflo-metering.query-usage
      with:
        meterApiName: tools.meterApiName
        startTimeInSeconds: tools.startTimeInSeconds
        endTimeInSeconds: tools.endTimeInSeconds
        aggregation: tools.aggregation
        timeGroupingInterval: tools.timeGroupingInterval
      outputParameters:
      - type: object
        mapping: $.
    - name: list-customers
      description: List all customer accounts in Amberflo
      hints:
        readOnly: true
        openWorld: true
      call: amberflo-billing.list-customers
      outputParameters:
      - type: object
        mapping: $.
    - name: create-customer
      description: Create a new customer account in Amberflo
      hints:
        readOnly: false
      call: amberflo-billing.create-customer
      with:
        customerId: tools.customerId
        customerName: tools.customerName
        customerEmail: tools.customerEmail
        lifecycleStage: tools.lifecycleStage
      outputParameters:
      - type: object
        mapping: $.
    - name: list-invoices
      description: List invoices for a specific customer
      hints:
        readOnly: true
        openWorld: true
      call: amberflo-billing.list-invoices
      with:
        customerId: tools.customerId
      outputParameters:
      - type: object
        mapping: $.
    - name: create-prepaid-order
      description: Create a prepaid credit order for a customer
      hints:
        readOnly: false
      call: amberflo-billing.create-prepaid-order
      with:
        customerId: tools.customerId
        amount: tools.amount
        currency: tools.currency
      outputParameters:
      - type: object
        mapping: $.
