naftiko: 1.0.0-alpha2
info:
  label: Amberflo Metering API — Usage Queries
  description: 'Amberflo Metering API — Usage Queries. 1 operations. Lead operation: Amberflo Query Usage Data. Self-contained
    Naftiko capability covering one Amberflo business surface.'
  tags:
  - Amberflo
  - Usage Queries
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMBERFLO_API_KEY: AMBERFLO_API_KEY
capability:
  consumes:
  - type: http
    namespace: metering-usage-queries
    baseUri: https://app.amberflo.io
    description: Amberflo Metering API — Usage Queries business capability. Self-contained, no shared references.
    resources:
    - name: usage
      path: /usage
      operations:
      - name: queryusage
        method: POST
        description: Amberflo Query Usage Data
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: X-API-KEY
      value: '{{env.AMBERFLO_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: metering-usage-queries-rest
    port: 8080
    description: REST adapter for Amberflo Metering API — Usage Queries. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/usage
      name: usage
      description: REST surface for usage.
      operations:
      - method: POST
        name: queryusage
        description: Amberflo Query Usage Data
        call: metering-usage-queries.queryusage
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: metering-usage-queries-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amberflo Metering API — Usage Queries. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: amberflo-query-usage-data
      description: Amberflo Query Usage Data
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: metering-usage-queries.queryusage
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
