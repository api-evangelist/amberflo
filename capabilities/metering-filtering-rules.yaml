naftiko: 1.0.0-alpha2
info:
  label: Amberflo Metering API — Filtering Rules
  description: 'Amberflo Metering API — Filtering Rules. 2 operations. Lead operation: Amberflo Create or Update Filtering
    Rule. Self-contained Naftiko capability covering one Amberflo business surface.'
  tags:
  - Amberflo
  - Filtering Rules
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMBERFLO_API_KEY: AMBERFLO_API_KEY
capability:
  consumes:
  - type: http
    namespace: metering-filtering-rules
    baseUri: https://app.amberflo.io
    description: Amberflo Metering API — Filtering Rules business capability. Self-contained, no shared references.
    resources:
    - name: meter-event-filtering-rules
      path: /meter-event-filtering-rules
      operations:
      - name: createfilteringrule
        method: POST
        description: Amberflo Create or Update Filtering Rule
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: listfilteringrules
        method: GET
        description: Amberflo List Filtering Rules
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: meterApiName
          in: query
          type: string
          description: The meter API name to list filtering rules for
          required: true
    authentication:
      type: apikey
      key: X-API-KEY
      value: '{{env.AMBERFLO_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: metering-filtering-rules-rest
    port: 8080
    description: REST adapter for Amberflo Metering API — Filtering Rules. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/meter-event-filtering-rules
      name: meter-event-filtering-rules
      description: REST surface for meter-event-filtering-rules.
      operations:
      - method: POST
        name: createfilteringrule
        description: Amberflo Create or Update Filtering Rule
        call: metering-filtering-rules.createfilteringrule
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: listfilteringrules
        description: Amberflo List Filtering Rules
        call: metering-filtering-rules.listfilteringrules
        with:
          meterApiName: rest.meterApiName
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: metering-filtering-rules-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amberflo Metering API — Filtering Rules. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: amberflo-create-update-filtering-rule
      description: Amberflo Create or Update Filtering Rule
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: metering-filtering-rules.createfilteringrule
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: amberflo-list-filtering-rules
      description: Amberflo List Filtering Rules
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: metering-filtering-rules.listfilteringrules
      with:
        meterApiName: tools.meterApiName
      outputParameters:
      - type: object
        mapping: $.
