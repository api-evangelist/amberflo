naftiko: 1.0.0-alpha2
info:
  label: Amberflo Metering API — Event Ingestion
  description: 'Amberflo Metering API — Event Ingestion. 1 operations. Lead operation: Amberflo Ingest Meter Events. Self-contained
    Naftiko capability covering one Amberflo business surface.'
  tags:
  - Amberflo
  - Event Ingestion
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMBERFLO_API_KEY: AMBERFLO_API_KEY
capability:
  consumes:
  - type: http
    namespace: metering-event-ingestion
    baseUri: https://app.amberflo.io
    description: Amberflo Metering API — Event Ingestion business capability. Self-contained, no shared references.
    resources:
    - name: ingest
      path: /ingest
      operations:
      - name: ingestmeterevents
        method: POST
        description: Amberflo Ingest Meter Events
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: X-API-KEY
      value: '{{env.AMBERFLO_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: metering-event-ingestion-rest
    port: 8080
    description: REST adapter for Amberflo Metering API — Event Ingestion. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/ingest
      name: ingest
      description: REST surface for ingest.
      operations:
      - method: POST
        name: ingestmeterevents
        description: Amberflo Ingest Meter Events
        call: metering-event-ingestion.ingestmeterevents
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: metering-event-ingestion-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amberflo Metering API — Event Ingestion. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: amberflo-ingest-meter-events
      description: Amberflo Ingest Meter Events
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: metering-event-ingestion.ingestmeterevents
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
