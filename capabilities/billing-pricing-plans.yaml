naftiko: 1.0.0-alpha2
info:
  label: Amberflo Billing API — Pricing Plans
  description: 'Amberflo Billing API — Pricing Plans. 1 operations. Lead operation: Amberflo Assign Pricing Plan to Customer.
    Self-contained Naftiko capability covering one Amberflo business surface.'
  tags:
  - Amberflo
  - Pricing Plans
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMBERFLO_API_KEY: AMBERFLO_API_KEY
capability:
  consumes:
  - type: http
    namespace: billing-pricing-plans
    baseUri: https://app.amberflo.io
    description: Amberflo Billing API — Pricing Plans business capability. Self-contained, no shared references.
    resources:
    - name: payments-pricing-amberflo-customer-pricing
      path: /payments-pricing-amberflo-customer-pricing
      operations:
      - name: assignpricingplan
        method: POST
        description: Amberflo Assign Pricing Plan to Customer
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: X-API-KEY
      value: '{{env.AMBERFLO_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: billing-pricing-plans-rest
    port: 8080
    description: REST adapter for Amberflo Billing API — Pricing Plans. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/payments-pricing-amberflo-customer-pricing
      name: payments-pricing-amberflo-customer-pricing
      description: REST surface for payments-pricing-amberflo-customer-pricing.
      operations:
      - method: POST
        name: assignpricingplan
        description: Amberflo Assign Pricing Plan to Customer
        call: billing-pricing-plans.assignpricingplan
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: billing-pricing-plans-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amberflo Billing API — Pricing Plans. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: amberflo-assign-pricing-plan-customer
      description: Amberflo Assign Pricing Plan to Customer
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: billing-pricing-plans.assignpricingplan
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
