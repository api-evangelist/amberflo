meters:
  - name: subscription_months
    unit: month
    aggregation: sum
    dimensions:
      - tier
  - name: meter_events_ingested
    unit: event
    aggregation: sum
    dimensions:
      - account
      - meter_name
  - name: billing_volume_processed
    unit: USD
    aggregation: sum
    dimensions:
      - account
      - product
  - name: overage_events
    unit: event
    aggregation: sum
    dimensions:
      - account
  - name: overage_billing_volume
    unit: USD
    aggregation: sum
    dimensions:
      - account
principles:
  - name: Visibility
    description: Use Amberflo's own usage and revenue dashboards (eat-your-own-dogfood); export billable
      events to your data warehouse and reconcile against the Amberflo invoice.
  - name: Allocation
    description: Tag meters and customers with product, environment, and team; chargeback subscription
      cost via meter-event share.
  - name: Optimization
    description: Right-size the Growth tier (250K vs 500K vs 1M request bracket) to your actual ingest
      volume; batch meter events to minimize request count; consolidate redundant meters.
  - name: Accountability
    description: Owner of monetization/finance team owns the Amberflo subscription; alert on overage thresholds
      and review monthly billing-volume utilization against tier inclusions.
