description: 'FOCUS-aligned FinOps for Amberflo: tiered monthly subscription (Startups, Growth, Enterprise)
  with included pools of billing volume and meter events plus overage at 0.54% on additional billing
  volume and $5 per additional 10,000 meter events. Amberflo itself is a metering-and-billing platform,
  so its FinOps posture mirrors the SaaS subscription archetype.'
sources:
  - https://www.amberflo.io/pricing
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Amberflo.io, Inc.
serviceCategory: FinOps / Metering and Billing
billingModel:
  pricingCategory: Tiered Subscription + Overage
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Usage
    - Tax
    - Adjustment
    - Credit
focusColumns:
  ServiceName: Amberflo
  ServiceCategory: Business Applications
  ServiceSubcategory: Metering and Billing
  ProviderName: Amberflo
