aid: amberflo
name: Amberflo
description: >-
  Amberflo is a cloud metering, usage-based billing, and AI cost management
  platform. It provides real-time event ingestion, customer billing
  automation, AI gateway capabilities, and FinOps visibility for API-driven
  and AI-powered businesses. The platform supports usage-based, token-based,
  seat-based, and outcome-based pricing models with automated invoicing and
  embeddable billing dashboards.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - Usage-Based Billing
  - Metering
  - FinOps
  - AI Cost Management
  - Billing
  - Monetization
url: >-
  https://raw.githubusercontent.com/api-evangelist/amberflo/refs/heads/main/apis.yml
created: '2026-03-27'
modified: '2026-04-19'
specificationVersion: '0.19'
apis:
  - aid: amberflo:metering-api
    name: Amberflo Metering API
    description: >-
      The Amberflo Metering API provides meter definition management, high-throughput
      event ingestion, usage queries, raw event queries, and filtering rules. It
      supports real-time metering for API calls, tokens, and custom events with
      automatic aggregation and deduplication.
    humanURL: https://docs.amberflo.io/reference/ingest-meters
    baseURL: https://app.amberflo.io
    tags:
      - Metering
      - Event Ingestion
      - Usage Tracking
    properties:
      - type: Documentation
        url: https://docs.amberflo.io/reference/ingest-meters
      - type: APIReference
        url: https://docs.amberflo.io/reference/ingest-meters
      - type: OpenAPI
        url: >-
          https://raw.githubusercontent.com/api-evangelist/amberflo/refs/heads/main/openapi/amberflo-metering-openapi.yaml

  - aid: amberflo:billing-api
    name: Amberflo Billing API
    description: >-
      The Amberflo Billing API manages customers, pricing plans, invoices,
      prepaid orders, promotions, commitments, and billing analysis. It
      supports usage-based monetization workflows including revenue recognition,
      chargeback management, and customer cost visibility.
    humanURL: https://docs.amberflo.io/reference/customers
    baseURL: https://app.amberflo.io
    tags:
      - Billing
      - Customers
      - Invoicing
      - Pricing Plans
    properties:
      - type: Documentation
        url: https://docs.amberflo.io/reference/customers
      - type: APIReference
        url: https://docs.amberflo.io/reference/customers
      - type: OpenAPI
        url: >-
          https://raw.githubusercontent.com/api-evangelist/amberflo/refs/heads/main/openapi/amberflo-billing-openapi.yaml

  - aid: amberflo:cost-tracking-api
    name: Amberflo Cost Tracking API
    description: >-
      The Amberflo Cost Tracking API provides AI and cloud cost management
      capabilities including cloud provider integrations, business unit management,
      cost allocation rules, budget management, and cost query analytics. It
      enables FinOps workflows with per-unit costs, showbacks, chargebacks, and
      margin analysis per customer.
    humanURL: https://docs.amberflo.io/reference/cloud-cost-tracking
    baseURL: https://app.amberflo.io
    tags:
      - Cost Tracking
      - FinOps
      - Cloud Cost Management
      - Budgets
    properties:
      - type: Documentation
        url: https://docs.amberflo.io/reference/cloud-cost-tracking
      - type: APIReference
        url: https://docs.amberflo.io/reference/cloud-cost-tracking

  - aid: amberflo:ai-gateway-api
    name: Amberflo AI Gateway API
    description: >-
      The Amberflo AI Gateway provides a unified API for routing requests to
      1,500+ LLM models with intelligent model routing, cost optimization,
      built-in fallbacks, and MCP server traffic monitoring. It tracks LLM
      model rates and metrics for AI cost governance.
    humanURL: https://docs.amberflo.io/docs/ai-gateway
    baseURL: https://app.amberflo.io
    tags:
      - AI Gateway
      - LLM
      - Model Routing
      - AI Cost Management
    properties:
      - type: Documentation
        url: https://docs.amberflo.io/docs/ai-gateway

