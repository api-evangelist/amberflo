  - type: Features
    data:
      - name: Real-Time Event Ingestion
        description: >-
          Ingest millions to billions of high-cardinality usage events in real
          time with idempotency, deduplication, and automatic aggregation.
      - name: AI Cost Management
        description: >-
          Unified LLM access and control across 1,500+ models with per-unit
          costs, rollups, budgets, Cost Guards, and margin analysis per customer.
      - name: AI Gateway and Model Routing
        description: >-
          Single API for multiple LLM providers with intelligent cost
          optimization, automatic retries, fallbacks, and MCP server traffic
          monitoring.
      - name: Usage-Based Billing
        description: >-
          Flexible billing models including usage-based, token-based, seat-based,
          fixed fee, and outcome-based pricing with multi-currency support and
          automated invoicing.
      - name: Embeddable Billing Dashboards
        description: >-
          Customer-facing billing portals and dashboards via a React.js UI Kit
          with custom domain support and SSO integration.
      - name: Revenue Operations
        description: >-
          Revenue recognition automation, RevRec ledger tracking, tax management,
          and integrations with Stripe and NetSuite.
      - name: Budget Management
        description: >-
          Spending limits, threshold alerts, Cost Guards, and automated
          notifications for cloud and AI cost governance.
      - name: Chargeback and Showback
        description: >-
          Chargeback rates, quotes, and invoices for internal cost allocation
          and showback reporting across business units.
  - type: UseCases
    data:
      - name: API Monetization
        description: >-
          Meter API usage and automatically bill customers based on calls,
          tokens, or custom events with flexible pricing models.
      - name: AI Cost Governance
        description: >-
          Track and govern LLM spending across teams and customers with budgets,
          alerts, and per-customer cost attribution.
      - name: SaaS Billing Automation
        description: >-
          Automate end-to-end billing for SaaS products with usage-based pricing
          plans, invoicing, and customer portals.
      - name: Cloud FinOps
        description: >-
          Allocate and showback cloud costs to business units and customers using
          automated cost allocation rules and chargeback workflows.
      - name: Customer Cost Transparency
        description: >-
          Provide customers with real-time visibility into their usage and costs
          via embedded dashboards and billing portals.
      - name: Usage Analytics and Reporting
        description: >-
          Query and analyze usage data in real time with batch and sparse query
          modes, raw event queries, and revenue calculation analytics.
  - type: Integrations
    data:
      - name: Stripe
        description: >-
          Native integration with Stripe for payment processing and revenue
          operations workflows.
      - name: NetSuite
        description: >-
          Integration with NetSuite for revenue recognition and financial
          reporting.
      - name: Kong
        description: >-
          Official Kong plugin for metering API requests handled by Kong
          instances and monetizing APIs.
      - name: AWS SaaS Builder Toolkit
        description: >-
          Integration with AWS SaaS Builder Toolkit for SaaS billing and
          metering best practices on AWS.
      - name: LiteLLM
        description: >-
          Logging callback for LiteLLM to meter LLM usage and monitor AI costs.
      - name: AWS Lambda
        description: >-
          Examples and utilities for metering AWS Lambda function invocations.
